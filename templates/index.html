<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Performance Predictor</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <span class="logo">🎓 Student Performance Predictor</span>
      <nav>
        <a href="#predict-section">Predict</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- ── HERO ───────────────────────────────────────────────── -->
    <section class="hero">
      <h1>Predict Student Academic Performance</h1>
      <p>Enter student details below to get an AI-powered prediction of their final exam score.</p>
    </section>

    <!-- ── PREDICTION FORM ────────────────────────────────────── -->
    <section id="predict-section" class="card">
      <h2>📋 Student Details</h2>
      <form id="predict-form">

        <div class="form-grid">

          <div class="form-group">
            <label>Study Hours / Day <span class="hint">(1–10)</span></label>
            <input type="number" id="study_hours" min="1" max="10" step="0.5" value="5" required />
          </div>

          <div class="form-group">
            <label>Attendance % <span class="hint">(0–100)</span></label>
            <input type="number" id="attendance" min="0" max="100" step="1" value="80" required />
          </div>

          <div class="form-group">
            <label>Previous Grade <span class="hint">(0–100)</span></label>
            <input type="number" id="prev_grade" min="0" max="100" step="1" value="70" required />
          </div>

          <div class="form-group">
            <label>Assignment Completion % <span class="hint">(0–100)</span></label>
            <input type="number" id="assignment_rate" min="0" max="100" step="1" value="85" required />
          </div>

          <div class="form-group">
            <label>Health Status <span class="hint">(1=Poor … 5=Excellent)</span></label>
            <select id="health">
              <option value="1">1 – Poor</option>
              <option value="2">2 – Below Average</option>
              <option value="3" selected>3 – Average</option>
              <option value="4">4 – Good</option>
              <option value="5">5 – Excellent</option>
            </select>
          </div>

          <div class="form-group">
            <label>Extra-Curricular Activities</label>
            <select id="extra_activities">
              <option value="0">No</option>
              <option value="1" selected>Yes</option>
            </select>
          </div>

          <div class="form-group">
            <label>Internet Access at Home</label>
            <select id="internet_access">
              <option value="0">No</option>
              <option value="1" selected>Yes</option>
            </select>
          </div>

          <div class="form-group">
            <label>Parental Education Level</label>
            <select id="parental_edu">
              <option value="0">None</option>
              <option value="1">High School</option>
              <option value="2" selected>Bachelor's</option>
              <option value="3">Master's</option>
            </select>
          </div>

          <div class="form-group">
            <label>Family Support Level</label>
            <select id="family_support">
              <option value="0">Low</option>
              <option value="1" selected>Medium</option>
              <option value="2">High</option>
            </select>
          </div>

        </div><!-- /form-grid -->

        <button type="submit" class="btn-predict">🔮 Predict Score</button>
      </form>

      <!-- Result box (hidden until prediction) -->
      <div id="result-box" class="result-box hidden">
        <div class="result-score" id="result-score">--</div>
        <div class="result-grade" id="result-grade">Grade: --</div>
        <div class="result-bar-wrap">
          <div class="result-bar" id="result-bar"></div>
        </div>
        <p id="result-msg" class="result-msg"></p>
      </div>

      <div id="error-box" class="error-box hidden"></div>
    </section>


  </main>



  <script src="/static/js/main.js"></script>
</body>
</html>
